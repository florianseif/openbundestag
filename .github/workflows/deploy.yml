name: Deploy to Hugging Face Space

# Pushes the app to the HF Space (MissionJupiter/openbundestag) whenever
# an app-relevant file changes on main. The 2 GB DuckDB DB is NOT shipped here —
# it lives in a separate public dataset and is downloaded by the app at startup.

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "src/queries.py"
      - "requirements.txt"
      - ".streamlit/**"
      - "deploy/hf/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Avoid overlapping deploys racing each other.
concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install hf CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Assemble Space files
        run: |
          set -euo pipefail
          rm -rf space && mkdir -p space/.streamlit space/src
          cp app.py requirements.txt space/
          # app.py imports the shared query layer from src/.
          cp src/__init__.py src/queries.py space/src/
          cp .streamlit/config.toml space/.streamlit/
          cp deploy/hf/Dockerfile deploy/hf/README.md space/

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload MissionJupiter/openbundestag space . \
            --repo-type space \
            --commit-message "Deploy ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}"
