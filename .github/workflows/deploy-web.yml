name: Deploy site to Cloudflare Pages

# Builds the SvelteKit frontend (web/) and deploys it to Cloudflare Pages.
# PUBLIC_API_BASE must point at the deployed HF Space API.
#
# Required secrets:
#   CLOUDFLARE_API_TOKEN  - token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID - your Cloudflare account id
# Required variable (Settings → Variables):
#   PUBLIC_API_BASE       - e.g. https://missionjupiter-openbundestag-api.hf.space

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build
        env:
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy .svelte-kit/cloudflare --project-name=openbundestag
