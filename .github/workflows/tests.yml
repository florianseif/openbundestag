name: Tests

# Runs the pytest + Hypothesis suite (tests/) against the pure data-extraction
# logic in src/. No database is needed — the faction-resolution tests build
# tiny in-memory DuckDB instances, so the whole suite runs in a few seconds.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "api/**"
      - "tests/**"
      - "run.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "src/**"
      - "api/**"
      - "tests/**"
      - "run.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"
  workflow_dispatch: {}

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest
